<!doctype html>
<html>
    <head>
        <title>articles — Ansilian</title>
        <link
            rel="icon"
            type="image/png"
            href="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Naskh+Arabic:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../style.css" />

        <style>
            .page-content {
                max-width: 680px;
                margin: 60px auto;
                padding: 0 24px;
                text-align: left;
            }

            .page-title {
                font-family: "Inter", sans-serif;
                font-weight: 200;
                font-size: 32px;
                margin: 0 0 36px 0;
                letter-spacing: -0.5px;
                color: white;
            }

            .post-card {
                display: block;
                text-decoration: none;
                color: white;
                padding: 18px 20px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                margin-bottom: 10px;
                cursor: pointer;
                transition:
                    background 0.15s ease,
                    border-color 0.15s ease;
                background: rgba(255, 255, 255, 0.02);
            }

            .post-card:hover {
                background: rgba(255, 255, 255, 0.055);
                border-color: rgba(255, 255, 255, 0.16);
            }

            .card-top-row {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 6px;
            }

            .card-number {
                font-family: "Inter", sans-serif;
                font-size: 12px;
                font-weight: 400;
                color: rgba(255, 255, 255, 0.25);
            }

            .card-dot {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.15);
            }

            .card-date {
                font-family: "Inter", sans-serif;
                font-size: 12px;
                font-weight: 300;
                color: rgba(255, 255, 255, 0.28);
            }

            .card-title {
                font-family: "Inter", sans-serif;
                font-size: 17px;
                font-weight: 400;
                margin-bottom: 5px;
            }

            .card-desc {
                font-family: "Inter", sans-serif;
                font-size: 13px;
                font-weight: 300;
                color: rgba(255, 255, 255, 0.48);
                margin-bottom: 8px;
            }

            .card-author {
                font-family: "Inter", sans-serif;
                font-size: 12px;
                font-weight: 300;
                color: rgba(255, 255, 255, 0.3);
            }

            .status-text {
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 15px;
                color: rgba(255, 255, 255, 0.3);
            }
        </style>
    </head>
    <body>
        <!-- ===================== COPY-PASTE HEADER ===================== -->
        <header class="topbar">
            <a class="home-button" href="https://wmw-frog-enjoyer.github.io/">
                <img
                    class="home-logo"
                    src="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
                    alt="home-Logo"
                />
                <span>Ansilian</span>
            </a>
            <div class="center-nav">
                <a
                    class="archivers"
                    href="https://wmw-frog-enjoyer.github.io/archivers"
                >
                    archivers
                </a>
            </div>
        </header>
        <!-- ==================== END COPY-PASTE HEADER ================== -->

        <div class="page-content">
            <h1 class="page-title">articles</h1>
            <div id="posts-container">
                <p class="status-text">loading...</p>
            </div>
        </div>

        <script>
            async function loadPosts() {
                const container = document.getElementById("posts-container");

                try {
                    const response = await fetch("posts/posts.json");
                    const posts = await response.json();

                    container.innerHTML = "";

                    if (posts.length === 0) {
                        container.innerHTML =
                            '<p class="status-text">nothing here yet.</p>';
                        return;
                    }

                    // sort by id number, highest (newest) first
                    posts.sort((a, b) => Number(b.id) - Number(a.id));

                    posts.forEach((post) => {
                        const card = document.createElement("a");
                        card.className = "post-card";
                        card.href = `reader.html?post=${post.id}`;

                        card.innerHTML = `
                            <div class="card-top-row">
                                <span class="card-number">#${post.id}</span>
                                <span class="card-dot">·</span>
                                <span class="card-date">${post.date}</span>
                            </div>
                            <div class="card-title">${post.title}</div>
                            ${post.description ? `<div class="card-desc">${post.description}</div>` : ""}
                            <div class="card-author">${post.author}</div>
                        `;

                        container.appendChild(card);
                    });
                } catch (error) {
                    container.innerHTML =
                        '<p class="status-text">could not load articles.</p>';
                    console.error(error);
                }
            }

            loadPosts();
        </script>
    </body>
</html>
