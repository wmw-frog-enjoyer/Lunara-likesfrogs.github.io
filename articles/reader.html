<!doctype html>
<html>
    <head>
        <title>Ansilian</title>
        <link
            rel="icon"
            type="image/png"
            href="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Noto+Naskh+Arabic:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../style.css" />

        <!-- marked.js converts .md files into HTML -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

        <style>
            .page-content {
                max-width: 680px;
                margin: 50px auto;
                padding: 0 24px;
                text-align: left;
            }

            .back-link {
                display: inline-block;
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 13px;
                color: rgba(255, 255, 255, 0.35);
                text-decoration: none;
                margin-bottom: 32px;
                transition: color 0.15s ease;
            }

            .back-link:hover {
                color: rgba(255, 255, 255, 0.75);
            }

            /* the preface block above the article content */
            .post-preface {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 20px;
            }

            .preface-number {
                font-family: "Inter", sans-serif;
                font-size: 13px;
                font-weight: 300;
                color: rgba(255, 255, 255, 0.22);
                letter-spacing: 0.04em;
            }

            .preface-right {
                text-align: right;
                display: flex;
                flex-direction: column;
                gap: 3px;
            }

            .preface-author {
                font-family: "Inter", sans-serif;
                font-size: 13px;
                font-weight: 300;
                color: rgba(255, 255, 255, 0.45);
            }

            .preface-date {
                font-family: "Inter", sans-serif;
                font-size: 12px;
                font-weight: 300;
                color: rgba(255, 255, 255, 0.25);
            }

            .preface-divider {
                border: none;
                border-top: 1px solid rgba(255, 255, 255, 0.09);
                margin: 0 0 28px 0;
            }

            /* styles for the rendered markdown content */
            .post-body h1 {
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 26px;
                margin: 0 0 18px 0;
                letter-spacing: -0.5px;
                color: white;
            }

            .post-body h2 {
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 19px;
                margin: 34px 0 10px 0;
                color: rgba(255, 255, 255, 0.9);
            }

            .post-body h3 {
                font-family: "Inter", sans-serif;
                font-weight: 400;
                font-size: 16px;
                margin: 26px 0 8px 0;
                color: rgba(255, 255, 255, 0.85);
            }

            .post-body p {
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 15px;
                line-height: 1.8;
                color: rgba(255, 255, 255, 0.76);
                margin: 0 0 15px 0;
            }

            .post-body ul,
            .post-body ol {
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 15px;
                line-height: 1.8;
                color: rgba(255, 255, 255, 0.76);
                padding-left: 22px;
                margin: 0 0 15px 0;
            }

            .post-body li {
                margin-bottom: 4px;
            }

            /* > blockquotes */
            .post-body blockquote {
                border-left: 2px solid rgba(255, 255, 255, 0.18);
                margin: 20px 0;
                padding: 2px 0 2px 18px;
                color: rgba(255, 255, 255, 0.42);
                font-style: italic;
            }

            /* `inline code` */
            .post-body code {
                font-size: 13px;
                background: rgba(255, 255, 255, 0.07);
                padding: 2px 6px;
                border-radius: 4px;
            }

            /* ```code blocks``` */
            .post-body pre {
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid rgba(255, 255, 255, 0.07);
                border-radius: 8px;
                padding: 14px 16px;
                overflow-x: auto;
                margin: 0 0 16px 0;
            }

            .post-body pre code {
                background: none;
                padding: 0;
            }

            /* --- horizontal rules */
            .post-body hr {
                border: none;
                border-top: 1px solid rgba(255, 255, 255, 0.09);
                margin: 28px 0;
            }

            .post-body strong {
                font-weight: 500;
            }

            .post-body em {
                font-style: italic;
            }

            .post-body a {
                color: rgba(150, 200, 255, 0.85);
            }

            .post-body img {
                max-width: 100%;
                border-radius: 8px;
            }

            .status-text {
                font-family: "Inter", sans-serif;
                font-weight: 300;
                font-size: 15px;
                color: rgba(255, 255, 255, 0.3);
            }
        </style>
    </head>
    <body>
        <!-- ===================== COPY-PASTE HEADER ===================== -->
        <header class="topbar">
            <a class="home-button" href="https://wmw-frog-enjoyer.github.io/">
                <img
                    class="home-logo"
                    src="https://wmw-frog-enjoyer.github.io/assets/ansilian.png"
                    alt="home-Logo"
                />
                <span>Ansilian</span>
            </a>
            <div class="center-nav">
                <a
                    class="archivers"
                    href="https://wmw-frog-enjoyer.github.io/archivers"
                >
                    archivers
                </a>
            </div>
        </header>
        <!-- ==================== END COPY-PASTE HEADER ================== -->

        <div class="page-content">
            <a class="back-link" href="index.html">← back to articles</a>

            <!-- preface: number on the left, author + date on the right -->
            <div class="post-preface">
                <span class="preface-number" id="preface-number"></span>
                <div class="preface-right">
                    <span class="preface-author" id="preface-author"></span>
                    <span class="preface-date" id="preface-date"></span>
                </div>
            </div>
            <hr class="preface-divider" />

            <!-- the .md content goes here -->
            <div id="post-body" class="post-body">
                <p class="status-text">loading...</p>
            </div>
        </div>

        <script>
            async function loadPost() {
                const postBody = document.getElementById("post-body");

                // read ?post=001 from the URL
                const params = new URLSearchParams(window.location.search);
                const postId = params.get("post");

                if (!postId) {
                    postBody.innerHTML =
                        '<p class="status-text">no article specified.</p>';
                    return;
                }

                try {
                    // fetch the matching entry from posts.json to get author/date
                    const metaResponse = await fetch("posts/posts.json");
                    const allPosts = await metaResponse.json();
                    const meta = allPosts.find((p) => p.id === postId);

                    if (meta) {
                        document.getElementById("preface-number").textContent =
                            `#${meta.id}`;
                        document.getElementById("preface-author").textContent =
                            meta.author;
                        document.getElementById("preface-date").textContent =
                            meta.date;
                        document.title = `${meta.title} — Ansilian`;
                    }

                    // fetch the .md file and render it
                    const mdResponse = await fetch(`posts/${postId}.md`);

                    if (!mdResponse.ok) {
                        postBody.innerHTML =
                            '<p class="status-text">article not found.</p>';
                        return;
                    }

                    const markdown = await mdResponse.text();
                    postBody.innerHTML = marked.parse(markdown);
                } catch (error) {
                    postBody.innerHTML =
                        '<p class="status-text">could not load article.</p>';
                    console.error(error);
                }
            }

            loadPost();
        </script>
    </body>
</html>
